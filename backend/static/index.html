<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>warp-proxy 管理面板</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #04101f;
    --panel: rgba(13, 30, 48, .94);
    --panel-2: rgba(17, 40, 63, .96);
    --line: rgba(87, 114, 148, .32);
    --line-soft: rgba(87, 114, 148, .18);
    --text: #e8f1ff;
    --muted: #8fa4bd;
    --blue: #2086ff;
    --green: #32d268;
    --amber: #f4a51c;
    --red: #ef4444;
    --purple: #8b5cf6;
    --shadow: 0 22px 60px rgba(0,0,0,.32);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    min-width: 1040px;
    margin: 0;
    background:
      radial-gradient(circle at 10% 0%, rgba(32,134,255,.18), transparent 32%),
      linear-gradient(145deg, #03101d 0%, #061626 55%, #03111e 100%);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  button, input { font: inherit; }
  button { cursor: pointer; }
  .app { display: grid; grid-template-columns: 240px minmax(800px, 1fr); min-height: 100vh; }
  .sidebar { position: sticky; top: 0; height: 100vh; padding: 26px 16px; background: rgba(3,14,27,.78); border-right: 1px solid var(--line); }
  .brand { display: flex; align-items: center; gap: 12px; padding: 0 10px 28px; font-size: 18px; font-weight: 800; }
  .brand-mark { width: 34px; height: 34px; border-radius: 50%; background: conic-gradient(from 40deg, #2b95ff, #22d3ee, #2563eb, #2b95ff); }
  .nav { display: grid; gap: 8px; }
  .nav a { height: 48px; display: flex; align-items: center; gap: 12px; padding: 0 14px; color: #bed0e4; text-decoration: none; border: 1px solid transparent; border-radius: 8px; }
  .nav a:hover, .nav a.active { background: linear-gradient(90deg, rgba(32,134,255,.24), rgba(32,134,255,.08)); border-color: rgba(32,134,255,.52); color: #fff; }
  .nav-icon { width: 22px; height: 22px; display: inline-grid; place-items: center; color: #93c5fd; font-size: 13px; font-weight: 800; }
  .side-card { position: absolute; left: 16px; right: 16px; bottom: 28px; padding: 16px; border: 1px solid var(--line); border-radius: 8px; background: rgba(12,28,45,.78); }
  .side-card div { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; color: var(--muted); font-size: 13px; }
  .side-card strong { color: var(--text); }
  .main { padding: 24px 28px 28px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
  h1, h2 { margin: 0; line-height: 1.2; }
  h1 { font-size: 24px; }
  h2 { font-size: 17px; }
  .tools { display: flex; align-items: center; gap: 10px; }
  .btn { height: 36px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid transparent; border-radius: 7px; padding: 0 12px; color: white; background: var(--blue); box-shadow: 0 8px 20px rgba(32,134,255,.22); font-weight: 700; font-size: 13px; }
  .btn:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .btn.secondary { color: #cfe0f5; background: rgba(11,26,43,.74); border-color: var(--line); box-shadow: none; }
  .btn.green { background: #12b95d; color: #03170d; }
  .btn.amber { background: var(--amber); color: #201200; }
  .btn.red { background: rgba(239,68,68,.18); color: #fca5a5; border-color: rgba(239,68,68,.45); box-shadow: none; }
  .cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 16px; }
  .metric { min-height: 126px; padding: 18px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(145deg, rgba(18,42,66,.96), rgba(9,24,41,.92)); box-shadow: var(--shadow); }
  .metric-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .metric-icon { width: 50px; height: 50px; border-radius: 50%; display: grid; place-items: center; background: rgba(32,134,255,.18); color: #7cc4ff; font-weight: 900; }
  .metric.green .metric-icon { background: rgba(34,197,94,.18); color: #80f3a3; }
  .metric.purple .metric-icon { background: rgba(139,92,246,.18); color: #b59cff; }
  .metric.amber .metric-icon { background: rgba(244,165,28,.18); color: #ffd27a; }
  .metric-label { color: var(--muted); font-size: 13px; font-weight: 700; }
  .metric-value { margin-top: 8px; font-size: 28px; font-weight: 800; word-break: break-word; }
  .metric-sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 420px; gap: 16px; align-items: start; }
  .stack { display: grid; gap: 16px; }
  .panel { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); box-shadow: var(--shadow); overflow: hidden; }
  .panel-head { min-height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line-soft); }
  .panel-body { padding: 16px; }
  .status { display: inline-flex; align-items: center; gap: 6px; min-height: 24px; border-radius: 999px; padding: 2px 9px; font-size: 12px; font-weight: 800; }
  .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .status.ok { color: #78f09a; background: rgba(34,197,94,.12); }
  .status.warn { color: #ffd166; background: rgba(244,165,28,.13); }
  .status.err { color: #ff9d9d; background: rgba(239,68,68,.13); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 12px 14px; border-bottom: 1px solid var(--line-soft); text-align: left; vertical-align: middle; }
  th { color: #9fb2c7; font-weight: 700; background: rgba(7,19,34,.35); }
  code { color: #dbeafe; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .actions { display: flex; align-items: center; justify-content: flex-end; gap: 7px; flex-wrap: wrap; }
  .actions .btn { height: 30px; padding: 0 9px; font-size: 12px; }
  .field { width: 100%; height: 36px; padding: 0 11px; color: var(--text); background: rgba(6,18,32,.8); border: 1px solid var(--line); border-radius: 7px; outline: 0; }
  label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-line { display: flex; align-items: center; gap: 8px; margin: 14px 0; color: #dbeafe; }
  .proxy-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .log-box { max-height: 410px; overflow: auto; margin: 0; padding: 12px; border: 1px solid var(--line-soft); border-radius: 8px; background: rgba(3,12,23,.72); color: #cbd5e1; font-size: 12px; line-height: 1.55; }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
  .toast { position: fixed; right: 18px; top: 18px; z-index: 30; max-width: min(520px, calc(100vw - 36px)); padding: 12px 14px; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; background: #1768d7; color: white; box-shadow: var(--shadow); transform: translateX(120%); transition: transform .22s ease; }
  .toast.show { transform: translateX(0); }
  .toast.error { background: #c73535; }
  .toast.success { background: #148f4d; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="brand-mark"></span><span>WARP Proxy Manager</span></div>
    <nav class="nav">
      <a class="active" href="#overview"><span class="nav-icon">O</span>总览</a>
      <a href="#licenses"><span class="nav-icon">L</span>License 管理</a>
      <a href="#settings"><span class="nav-icon">S</span>代理配置</a>
      <a href="#logs"><span class="nav-icon">G</span>日志</a>
    </nav>
    <div class="side-card">
      <div><span>服务状态</span><strong id="sideStatus">检查中</strong></div>
      <div><span>刷新间隔</span><strong>15 秒</strong></div>
      <div><span>License</span><strong id="sideLicenseCount">0</strong></div>
      <div><span>当前 IP</span><strong id="sideIp">-</strong></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar" id="overview">
      <h1>节点控制台</h1>
      <div class="tools">
        <span id="statusBadge" class="status warn">检查中</span>
        <button class="btn secondary" onclick="refreshAll()">刷新</button>
        <button class="btn green" onclick="apiCall('/api/connect', '连接', this)">连接</button>
        <button class="btn red" onclick="apiCall('/api/disconnect', '断开', this)">断开</button>
      </div>
    </header>

    <section class="cards">
      <article class="metric green"><div class="metric-head"><span class="metric-icon">W</span><span class="metric-label">WARP 状态</span></div><div id="metricStatus" class="metric-value">-</div><div id="metricSvc" class="metric-sub">warp-svc 检查中</div></article>
      <article class="metric"><div class="metric-head"><span class="metric-icon">IP</span><span class="metric-label">出口 IP</span></div><div id="metricIp" class="metric-value">-</div><div class="metric-sub">Cloudflare WARP</div></article>
      <article class="metric purple"><div class="metric-head"><span class="metric-icon">L</span><span class="metric-label">当前 License</span></div><div id="metricLicense" class="metric-value">无</div><div id="metricLicenseCount" class="metric-sub">License 池 0</div></article>
      <article class="metric amber"><div class="metric-head"><span class="metric-icon">P</span><span class="metric-label">代理端口</span></div><div class="metric-value">1080 / 8080</div><div class="metric-sub">SOCKS5 / HTTP</div></article>
    </section>

    <div class="layout">
      <div class="stack">
        <section class="panel">
          <div class="panel-head"><h2>节点操作</h2><span class="metric-sub">操作可能需要 15-30 秒</span></div>
          <div class="panel-body actions" style="justify-content:flex-start">
            <button class="btn green" onclick="apiCall('/api/connect', '连接', this)">连接 WARP</button>
            <button class="btn red" onclick="apiCall('/api/disconnect', '断开', this)">断开 WARP</button>
            <button class="btn amber" onclick="rotateLicense(this)">立即轮换 IP</button>
            <button class="btn" onclick="generateLicense(this)">生成新 License</button>
          </div>
        </section>

        <section class="panel" id="licenses">
          <div class="panel-head"><h2>License 管理</h2><button class="btn" onclick="generateLicense(this)">生成 License</button></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Label</th><th>创建时间</th><th>初始 IP</th><th>状态</th><th>当前</th><th>操作</th></tr></thead>
              <tbody id="licenseRows"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
            </table>
          </div>
        </section>
      </div>

      <aside class="stack">
        <section class="panel" id="settings">
          <div class="panel-head"><h2>代理配置</h2><button class="btn secondary" onclick="loadSettings()">读取</button></div>
          <div class="panel-body">
            <div class="form-grid">
              <label>自动轮换间隔（分钟）<input id="settingInterval" class="field" type="number" min="0" value="0"></label>
              <label>健康检查间隔（秒）<input id="settingHealth" class="field" type="number" min="10" max="3600" value="60"></label>
            </div>
            <label class="checkbox-line"><input id="settingAuto" type="checkbox">启用自动轮换</label>
            <div class="proxy-box">
              <label>代理用户名<input id="settingUser" class="field" placeholder="留空 = 无认证"></label>
              <label>代理密码<input id="settingPass" class="field" type="password" placeholder="留空 = 无认证"></label>
            </div>
            <div class="actions" style="justify-content:flex-start;margin-top:14px"><button class="btn" onclick="saveSettings()">保存设置</button></div>
          </div>
        </section>

        <section class="panel" id="logs">
          <div class="panel-head"><h2>运行日志</h2><div class="tools"><button class="btn secondary" onclick="loadLogs()">刷新</button><button class="btn red" onclick="clearLogs()">清空</button></div></div>
          <div class="panel-body"><pre id="logBox" class="log-box">加载日志中...</pre></div>
        </section>
      </aside>
    </div>
  </main>
</div>

<script>
function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3600);
}

async function api(url, options = {}) {
  const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', ...(options.headers || {}) } });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  return res.json();
}

function statusPill(status) {
  if (status === 'connected') return ['ok', '已连接'];
  if (status === 'connecting') return ['warn', '连接中'];
  if (status === 'disconnected') return ['err', '已断开'];
  return ['warn', status || '未知'];
}

function shortId(value) {
  if (!value) return '无';
  return value.length > 14 ? value.slice(0, 12) + '...' : value;
}

function escapeHtml(value) {
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
}

async function loadStatus() {
  const status = await api('/api/status');
  const [kind, label] = statusPill(status.warp_status);
  const badge = document.getElementById('statusBadge');
  badge.className = `status ${kind}`;
  badge.textContent = label;
  document.getElementById('metricStatus').textContent = label;
  document.getElementById('metricSvc').textContent = status.service_running ? 'warp-svc 运行中' : 'warp-svc 未运行';
  document.getElementById('metricIp').textContent = status.external_ip || '-';
  document.getElementById('metricLicense').textContent = shortId(status.current_license_id);
  document.getElementById('sideStatus').textContent = label;
  document.getElementById('sideIp').textContent = status.external_ip || '-';
}

async function loadLicenses() {
  const data = await api('/api/licenses');
  const rows = document.getElementById('licenseRows');
  const licenses = data.licenses || [];
  document.getElementById('sideLicenseCount').textContent = licenses.length;
  document.getElementById('metricLicenseCount').textContent = `License 池 ${licenses.length}`;
  if (!licenses.length) {
    rows.innerHTML = '<tr><td colspan="7" class="empty">暂无 License</td></tr>';
    return;
  }
  rows.innerHTML = licenses.map(license => {
    const active = license.is_current || license.status === 'active';
    return `<tr>
      <td>${escapeHtml(license.seq || '-')}</td>
      <td><strong>${escapeHtml(license.label || shortId(license.id))}</strong><div class="metric-sub"><code>${escapeHtml(shortId(license.id))}</code></div></td>
      <td>${escapeHtml((license.created_at || '-').slice(0, 10))}</td>
      <td><code>${escapeHtml(license.initial_ip || '-')}</code></td>
      <td><span class="status ${active ? 'ok' : 'warn'}">${escapeHtml(active ? '活跃' : (license.status || '备用'))}</span></td>
      <td>${license.is_current ? '<span class="status ok">使用中</span>' : '-'}</td>
      <td><div class="actions">
        ${license.is_current ? '' : `<button class="btn secondary" onclick="activateLicense('${license.id}')">切换</button>`}
        ${license.is_current ? '' : `<button class="btn red" onclick="deleteLicense('${license.id}')">删除</button>`}
      </div></td>
    </tr>`;
  }).join('');
}

async function apiCall(url, label, btn) {
  if (btn) btn.disabled = true;
  try {
    await api(url, { method: 'POST' });
    showToast(`${label}成功`, 'success');
    setTimeout(refreshAll, 1200);
  } catch (error) {
    showToast(`${label}失败: ${error.message}`, 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function generateLicense(btn) {
  await apiCall('/api/licenses/generate', '生成 License', btn);
}

async function rotateLicense(btn) {
  await apiCall('/api/rotate', '轮换 IP', btn);
}

async function activateLicense(id) {
  try {
    await api(`/api/licenses/${id}/activate`, { method: 'POST' });
    showToast('License 已切换', 'success');
    await refreshAll();
  } catch (error) {
    showToast(`切换失败: ${error.message}`, 'error');
  }
}

async function deleteLicense(id) {
  if (!confirm(`确定删除 License ${shortId(id)}？`)) return;
  try {
    await api(`/api/licenses/${id}`, { method: 'DELETE' });
    showToast('License 已删除', 'success');
    await refreshAll();
  } catch (error) {
    showToast(`删除失败: ${error.message}`, 'error');
  }
}

async function loadSettings() {
  const settings = await api('/api/settings');
  document.getElementById('settingInterval').value = settings.refresh_interval_minutes || 0;
  document.getElementById('settingHealth').value = settings.health_check_interval || 60;
  document.getElementById('settingAuto').checked = !!settings.auto_rotate;
  document.getElementById('settingUser').value = settings.proxy_user || '';
  document.getElementById('settingPass').value = settings.proxy_pass || '';
}

async function saveSettings() {
  const body = {
    refresh_interval_minutes: parseInt(document.getElementById('settingInterval').value, 10) || 0,
    health_check_interval: parseInt(document.getElementById('settingHealth').value, 10) || 60,
    auto_rotate: document.getElementById('settingAuto').checked,
    proxy_user: document.getElementById('settingUser').value,
    proxy_pass: document.getElementById('settingPass').value,
  };
  try {
    await api('/api/settings', { method: 'POST', body: JSON.stringify(body) });
    showToast('设置已保存', 'success');
  } catch (error) {
    showToast(`保存失败: ${error.message}`, 'error');
  }
}

async function loadLogs() {
  try {
    const data = await api('/api/logs?tail=300');
    document.getElementById('logBox').textContent = (data.logs || []).join('\n') || '暂无日志';
  } catch (error) {
    document.getElementById('logBox').textContent = `加载日志失败: ${error.message}`;
  }
}

async function clearLogs() {
  try {
    await api('/api/logs/clear', { method: 'POST' });
    document.getElementById('logBox').textContent = '日志已清空';
  } catch (error) {
    showToast(`清空失败: ${error.message}`, 'error');
  }
}

async function refreshAll() {
  try {
    await Promise.all([loadStatus(), loadLicenses(), loadSettings(), loadLogs()]);
  } catch (error) {
    showToast(`刷新失败: ${error.message}`, 'error');
  }
}

refreshAll();
setInterval(() => {
  loadStatus().catch(error => showToast(`状态刷新失败: ${error.message}`, 'error'));
}, 15000);
</script>
</body>
</html>
