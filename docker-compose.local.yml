version: "3.8"

services:
  warp-proxy:
    build: .
    image: warp-proxy:local
    container_name: warp-proxy
    restart: unless-stopped
    init: true
    networks:
      - warp-proxy-net
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - APP_MODE=node
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
      - WEB_USER=${WEB_USER:-admin}
      - WEB_PASS=${WEB_PASS:-change_this_web_password}
      - WEB_SESSION_SECRET=${WEB_SESSION_SECRET:-change_this_session_secret}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-30}
    ports:
      - "127.0.0.1:1081:1080"
      - "127.0.0.1:1082:8080"
      - "127.0.0.1:8000:8000"
    volumes:
      - ./warp-data:/var/lib/cloudflare-warp
      - ./warp-app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  warp-proxy-net:
    name: warp-proxy-net
    driver: bridge
